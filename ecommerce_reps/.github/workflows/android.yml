name: Android APK
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: cd ecommerce_reps && flutter pub get && flutter test && flutter build apk --release
      - uses: actions/upload-artifact@v4
        with: { name: esrms-apk, path: ecommerce_reps/build/app/outputs/flutter-apk/app-release.apk }
