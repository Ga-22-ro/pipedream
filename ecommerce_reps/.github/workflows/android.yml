name: Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'ecommerce_reps/**'
      - '.github/workflows/android.yml'
  pull_request:
    paths:
      - 'ecommerce_reps/**'
      - '.github/workflows/android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Generate Android project files
        run: flutter create --platforms=android --org com.esrms .
        working-directory: ecommerce_reps
      - name: Install dependencies
        run: flutter pub get
        working-directory: ecommerce_reps
      - name: Run tests
        run: flutter test
        working-directory: ecommerce_reps
      - name: Build release APK
        run: flutter build apk --release
        working-directory: ecommerce_reps
      - uses: actions/upload-artifact@v6
        with:
          name: esrms-apk
          path: ecommerce_reps/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
